var xg = DATA.x_grid;

function bandTrace(name, color, dash) {
  return {
    x: xg.concat(xg.slice().reverse()),
    y: name.hi.concat(name.lo.slice().reverse()),
    fill: "toself",
    fillcolor: color + "20",
    line: { color: "transparent", width: 0 },
    name: name.label + " 94% HDI",
    hoverinfo: "skip",
    showlegend: false
  };
}

function medianTrace(name, color, dash) {
  return {
    x: xg, y: name.median,
    mode: "lines",
    line: { color: color, width: 2.5, dash: dash || "solid" },
    name: name.label
  };
}

);

var nuValues = ["1", "10", "20", "30"];

  var st = DATA.student_t[nuKey];

}
