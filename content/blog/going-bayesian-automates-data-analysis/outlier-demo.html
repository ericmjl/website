<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #222; padding: 16px; }
  .demo-container { max-width: 620px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 8px; }
  .header h3 { font-size: 15px; font-weight: 600; color: #333; }
  .header p { font-size: 12px; color: #888; margin-top: 2px; }
  #plot-wrapper { position: relative; width: 100%; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
  svg { display: block; width: 100%; height: auto; }
  .outlier-point { cursor: grab; }
  .outlier-point:active { cursor: grabbing; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 0; font-size: 13px; color: #555; }
  .controls input[type="range"] { width: 140px; cursor: pointer; }
  .controls .nu-value { font-weight: 600; color: #333; min-width: 28px; }
  .legend { display: flex; justify-content: center; gap: 20px; padding: 6px 0; font-size: 12px; color: #666; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 24px; height: 3px; border-radius: 2px; }
  .weight-display { text-align: center; font-size: 12px; color: #888; margin-top: 4px; }
  .weight-bar-container { width: 200px; height: 6px; background: #eee; border-radius: 3px; margin: 4px auto 0; overflow: hidden; }
  .weight-bar { height: 100%; background: #e85d3a; border-radius: 3px; transition: width 0.1s ease; }
</style>
</head>
<body>
<div class="demo-container">
  <div class="header">
    <h3>Normal vs Student-t: 4PL dose-response outlier</h3>
    <p>Drag the red point. Watch how each likelihood changes the curve.</p>
  </div>
  <div id="plot-wrapper"><svg id="plot" viewBox="0 0 620 400"></svg></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #2196F3;"></div><span>Normal likelihood (thin tails)</span></div>
    <div class="legend-item"><div class="legend-swatch" style="background: #e85d3a;"></div><span>Student-t likelihood (heavy tails)</span></div>
  </div>
  <div class="controls">
    <label>Degrees of freedom (nu):</label>
    <input type="range" id="nu-slider" min="1" max="30" step="0.5" value="3">
    <span class="nu-value" id="nu-display">3</span>
  </div>
  <div class="weight-display">
    Outlier weight: <span id="weight-text">1.00</span>
    <div class="weight-bar-container"><div class="weight-bar" id="weight-bar" style="width: 100%;"></div></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var SVG_NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('plot');
  var W = 620, H = 400;
  var M = { top: 20, right: 25, bottom: 45, left: 55 };
  var PW = W - M.left - M.right, PH = H - M.top - M.bottom;
  var xMin = 0.5, xMax = 8.5, yMin = 0, yMax = 105;

  function sx(x) { return M.left + (x - xMin) / (xMax - xMin) * PW; }
  function sy(y) { return M.top + (1 - (y - yMin) / (yMax - yMin)) * PH; }
  function unsx(px) { return xMin + (px - M.left) / PW * (xMax - xMin); }
  function unsy(py) { return yMin + (1 - (py - M.top) / PH) * (yMax - yMin); }

  // 4PL: y = bottom + (top-bottom) / (1 + 10^((ec50-x)*hill))
  function f4pl(x, p) {
    var exponent = (p[2] - x) * p[3];
    if (exponent > 100) exponent = 100;
    if (exponent < -100) exponent = -100;
    return p[0] + (p[1] - p[0]) / (1 + Math.pow(10, exponent));
  }

  // Weighted SSR objective
  function wSSR(p, xs, ys, w) {
    var ssr = 0;
    for (var i = 0; i < xs.length; i++) {
      var r = ys[i] - f4pl(xs[i], p);
      ssr += w[i] * r * r;
    }
    return ssr;
  }

  // Nelder-Mead simplex optimization (derivative-free)
  function nelderMead(f, init, maxIter) {
    var n = init.length;
    var alpha = 1, gamma = 2, rho = 0.5, sigma = 0.5;
    // Build initial simplex
    var s = [init.slice()];
    for (var i = 0; i < n; i++) {
      var p = init.slice();
      p[i] = p[i] * 1.1 + 0.001;
      s.push(p);
    }
    var fv = s.map(f);
    for (var iter = 0; iter < maxIter; iter++) {
      // Sort by function value
      var idx = fv.map(function(v, i) { return i; }).sort(function(a, b) { return fv[a] - fv[b]; });
      var simplex = idx.map(function(i) { return s[i]; });
      var fs = idx.map(function(i) { return fv[i]; });
      s = simplex; fv = fs;
      // Convergence check
      if (Math.abs(fv[0] - fv[n]) < 1e-12) break;
      // Centroid (exclude worst)
      var c = new Array(n).fill(0);
      for (var j = 0; j < n; j++) for (var k = 0; k < n; k++) c[k] += s[j][k];
      for (var k2 = 0; k2 < n; k2++) c[k2] /= n;
      // Reflect
      var r = c.map(function(v, j) { return v + alpha * (v - s[n][j]); });
      var fr = f(r);
      if (fr >= fv[0] && fr < fv[n - 1]) {
        s[n] = r; fv[n] = fr;
      } else if (fr < fv[0]) {
        // Expand
        var e = c.map(function(v, j) { return v + gamma * (v - s[n][j]); });
        var fe = f(e);
        if (fe < fr) { s[n] = e; fv[n] = fe; } else { s[n] = r; fv[n] = fr; }
      } else {
        // Contract
        var co = c.map(function(v, j) { return v + rho * (v - s[n][j]); });
        var fco = f(co);
        if (fco < fv[n]) { s[n] = co; fv[n] = fco; }
        else {
          // Shrink toward best
          for (var i2 = 1; i2 <= n; i2++) {
            s[i2] = s[0].map(function(v, j) { return v + sigma * (s[i2][j] - v); });
            fv[i2] = f(s[i2]);
          }
        }
      }
    }
    return s[0];
  }

  // IRLS with Student-t weights, using Nelder-Mead for each weighted fit
  function fit4pl(xs, ys, weights) {
    var w = weights || ys.map(function() { return 1; });
    var init = [
      Math.min.apply(null, ys) * 0.9,
      Math.max.apply(null, ys) * 1.1,
      4.5, 1.0
    ];
    return nelderMead(function(p) { return wSSR(p, xs, ys, w); }, init, 400);
  }

  function irlsStudentT(xs, ys, nu) {
    var n = xs.length;
    // Initial unweighted fit
    var params = fit4pl(xs, ys);
    var weights = ys.map(function() { return 1; });
    for (var iter = 0; iter < 10; iter++) {
      // Residuals
      var res = ys.map(function(y, i) { return y - f4pl(xs[i], params); });
      // MAD scale
      var absRes = res.map(Math.abs).sort(function(a, b) { return a - b; });
      var med = absRes[Math.floor(absRes.length / 2)];
      var scale = Math.max(1.4826 * med, 0.01);
      // Student-t weights
      var newW = res.map(function(r) {
        var u = r / scale;
        return (nu + 1) / (nu + u * u);
      });
      // Check convergence
      var maxCh = 0;
      for (var i = 0; i < n; i++) maxCh = Math.max(maxCh, Math.abs(newW[i] - weights[i]));
      weights = newW;
      params = fit4pl(xs, ys, weights);
      if (maxCh < 1e-6) break;
    }
    return { params: params, weights: weights };
  }

  // Data
  var dataXs = [1, 2, 3, 4, 5, 6, 7, 8];
  var trueP = [5, 95, 4.5, 1.5];
  var dataYs = dataXs.map(function(x) { return f4pl(x, trueP) + Math.sin(x * 3.1) * 1.2; });
  var outlier = { x: 4, y: 80 };
  var nu = 3;
  var curveXs = [];
  for (var cx = xMin; cx <= xMax; cx += 0.05) curveXs.push(cx);

  function el(tag, attrs) {
    var e = document.createElementNS(SVG_NS, tag);
    for (var key in attrs) { if (attrs.hasOwnProperty(key)) e.setAttribute(key, attrs[key]); }
    return e;
  }

  function buildStatic() {
    svg.appendChild(el('rect', { x: M.left, y: M.top, width: PW, height: PH, fill: '#fcfcfc', stroke: '#e8e8e8', 'stroke-width': 1 }));
    for (var x = 1; x <= 8; x++) svg.appendChild(el('line', { x1: sx(x), y1: M.top, x2: sx(x), y2: M.top + PH, stroke: '#f0f0f0', 'stroke-width': 1 }));
    for (var y = 0; y <= 100; y += 20) svg.appendChild(el('line', { x1: M.left, y1: sy(y), x2: M.left + PW, y2: sy(y), stroke: '#f0f0f0', 'stroke-width': 1 }));
    for (var xa = 1; xa <= 8; xa++) { var t = el('text', { x: sx(xa), y: M.top + PH + 16, 'text-anchor': 'middle', 'font-size': 10, fill: '#aaa' }); t.textContent = xa; svg.appendChild(t); }
    for (var ya = 0; ya <= 100; ya += 20) { var t2 = el('text', { x: M.left - 8, y: sy(ya) + 3, 'text-anchor': 'end', 'font-size': 10, fill: '#aaa' }); t2.textContent = ya; svg.appendChild(t2); }
    var xl = el('text', { x: M.left + PW / 2, y: H - 8, 'text-anchor': 'middle', 'font-size': 11, fill: '#999' }); xl.textContent = 'log10(dilution)'; svg.appendChild(xl);
    var yl = el('text', { x: 14, y: M.top + PH / 2, 'text-anchor': 'middle', 'font-size': 11, fill: '#999', transform: 'rotate(-90, 14, ' + (M.top + PH / 2) + ')' }); yl.textContent = '% neutralization'; svg.appendChild(yl);
  }

  var normalPath, robustPath, outlierCircle, outlierRing;
  function buildDynamic() {
    normalPath = el('path', { d: '', fill: 'none', stroke: '#2196F3', 'stroke-width': 2.5, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
    svg.appendChild(normalPath);
    robustPath = el('path', { d: '', fill: 'none', stroke: '#e85d3a', 'stroke-width': 2.5, 'stroke-dasharray': '7,4', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
    svg.appendChild(robustPath);
    for (var i = 0; i < dataXs.length; i++) svg.appendChild(el('circle', { cx: sx(dataXs[i]), cy: sy(dataYs[i]), r: 5, fill: '#2196F3', stroke: '#fff', 'stroke-width': 2 }));
    outlierRing = el('circle', { cx: sx(outlier.x), cy: sy(outlier.y), r: 12, fill: 'none', stroke: '#e85d3a', 'stroke-width': 1.5, opacity: 0.3 });
    svg.appendChild(outlierRing);
    outlierCircle = el('circle', { cx: sx(outlier.x), cy: sy(outlier.y), r: 8, fill: '#e85d3a', stroke: '#fff', 'stroke-width': 2, class: 'outlier-point' });
    svg.appendChild(outlierCircle);
  }

  function pathFromParams(p) {
    var pts = [];
    for (var i = 0; i < curveXs.length; i++) {
      var y = f4pl(curveXs[i], p);
      y = Math.max(yMin, Math.min(yMax, y));
      pts.push(sx(curveXs[i]).toFixed(1) + ',' + sy(y).toFixed(1));
    }
    return 'M' + pts.join(' L');
  }

  function update() {
    var allX = dataXs.concat([outlier.x]);
    var allY = dataYs.concat([outlier.y]);
    var nD = dataXs.length;
    var normalParams = fit4pl(allX, allY);
    var robustResult = irlsStudentT(allX, allY, nu);
    var ow = robustResult.weights[nD];
    normalPath.setAttribute('d', pathFromParams(normalParams));
    robustPath.setAttribute('d', pathFromParams(robustResult.params));
    outlierCircle.setAttribute('cx', sx(outlier.x));
    outlierCircle.setAttribute('cy', sy(outlier.y));
    outlierRing.setAttribute('cx', sx(outlier.x));
    outlierRing.setAttribute('cy', sy(outlier.y));
    document.getElementById('weight-text').textContent = ow.toFixed(3);
    document.getElementById('weight-bar').style.width = (ow * 100) + '%';
  }

  buildStatic(); buildDynamic(); update();

  var dragging = false;
  function getSVGPoint(cx, cy) {
    var pt = svg.createSVGPoint(); pt.x = cx; pt.y = cy;
    var ctm = svg.getScreenCTM(); if (!ctm) return null;
    return pt.matrixTransform(ctm.inverse());
  }
  outlierCircle.addEventListener('pointerdown', function(e) { dragging = true; try { outlierCircle.setPointerCapture(e.pointerId); } catch(err) {} e.preventDefault(); });
  outlierCircle.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    var p = getSVGPoint(e.clientX, e.clientY); if (!p) return;
    outlier.x = Math.max(xMin + 0.5, Math.min(xMax - 0.5, unsx(p.x)));
    outlier.y = Math.max(yMin + 2, Math.min(yMax - 2, unsy(p.y)));
    update(); e.preventDefault();
  });
  outlierCircle.addEventListener('pointerup', function(e) { dragging = false; try { outlierCircle.releasePointerCapture(e.pointerId); } catch(err) {} });
  outlierCircle.addEventListener('pointercancel', function() { dragging = false; });

  var nuSlider = document.getElementById('nu-slider');
  var nuDisplay = document.getElementById('nu-display');
  nuSlider.addEventListener('input', function(e) { nu = parseFloat(e.target.value); nuDisplay.textContent = nu; update(); });
})();
</script>
</body>
</html>
