<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #222;
    padding: 16px;
  }
  .demo-container { max-width: 580px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 8px; }
  .header h3 { font-size: 15px; font-weight: 600; color: #333; }
  .header p { font-size: 12px; color: #888; margin-top: 2px; }
  #plot-wrapper {
    position: relative;
    width: 100%;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
  }
  svg { display: block; width: 100%; height: auto; }
  .outlier-point { cursor: grab; }
  .outlier-point:active { cursor: grabbing; }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 13px;
    color: #555;
  }
  .controls input[type="range"] { width: 140px; cursor: pointer; }
  .controls .nu-value { font-weight: 600; color: #333; min-width: 28px; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 6px 0;
    font-size: 12px;
    color: #666;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 24px; height: 3px; border-radius: 2px; }
  .weight-display {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
  .weight-bar-container {
    width: 200px;
    height: 6px;
    background: #eee;
    border-radius: 3px;
    margin: 4px auto 0;
    overflow: hidden;
  }
  .weight-bar {
    height: 100%;
    background: #e85d3a;
    border-radius: 3px;
    transition: width 0.1s ease;
  }
</style>
</head>
<body>
<div class="demo-container">
  <div class="header">
    <h3>Normal vs Student-t: Drag the outlier</h3>
    <p>Drag the red point. Watch how each likelihood responds.</p>
  </div>
  <div id="plot-wrapper">
    <svg id="plot" viewBox="0 0 580 380"></svg>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background: #2196F3;"></div>
      <span>Normal (thin tails)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #e85d3a;"></div>
      <span>Student-t (heavy tails)</span>
    </div>
  </div>
  <div class="controls">
    <label>Degrees of freedom (nu):</label>
    <input type="range" id="nu-slider" min="1" max="30" step="0.5" value="3">
    <span class="nu-value" id="nu-display">3</span>
  </div>
  <div class="weight-display">
    Outlier weight: <span id="weight-text">1.00</span>
    <div class="weight-bar-container">
      <div class="weight-bar" id="weight-bar" style="width: 100%;"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var SVG_NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('plot');

  // Plot dimensions
  var W = 580, H = 380;
  var M = { top: 20, right: 20, bottom: 40, left: 50 };
  var PW = W - M.left - M.right;
  var PH = H - M.top - M.bottom;

  // Data space
  var xMin = 0, xMax = 10, yMin = 0, yMax = 100;

  function sx(x) { return M.left + (x - xMin) / (xMax - xMin) * PW; }
  function sy(y) { return M.top + (1 - (y - yMin) / (yMax - yMin)) * PH; }
  function unsx(px) { return xMin + (px - M.left) / PW * (xMax - xMin); }
  function unsy(py) { return yMin + (1 - (py - M.top) / PH) * (yMax - yMin); }

  // Generate clean data points (linear trend with small noise)
  var xs = [1, 2, 3, 4, 5, 6, 7, 8];
  var ys = xs.map(function(x) { return 15 + 7.5 * x + Math.sin(x * 2.3) * 1.5; });
  var nData = xs.length;

  // Outlier point (starts elevated, draggable)
  var outlier = { x: 5, y: 90 };

  var nu = 3;

  // OLS regression
  function ols(px, py) {
    var n = px.length;
    var mx = 0, my = 0;
    for (var i = 0; i < n; i++) { mx += px[i]; my += py[i]; }
    mx /= n; my /= n;
    var sxy = 0, sxx = 0;
    for (var j = 0; j < n; j++) {
      sxy += (px[j] - mx) * (py[j] - my);
      sxx += (px[j] - mx) * (px[j] - mx);
    }
    var slope = sxy / sxx;
    return { slope: slope, intercept: my - slope * mx };
  }

  // IRLS with Student-t weights
  function irlsStudentT(px, py, dof) {
    var n = px.length;
    var result = ols(px, py);
    var w = [];
    for (var i = 0; i < n; i++) w.push(1);

    for (var iter = 0; iter < 20; iter++) {
      // Compute residuals
      var residuals = [];
      for (var ri = 0; ri < n; ri++) {
        residuals.push(py[ri] - (result.slope * px[ri] + result.intercept));
      }

      // Robust scale estimate (MAD)
      var absRes = residuals.map(Math.abs).sort(function(a, b) { return a - b; });
      var median = absRes[Math.floor(absRes.length / 2)];
      var scale = Math.max(1.4826 * median, 0.001);

      // Student-t weights
      var newW = [];
      for (var wi = 0; wi < n; wi++) {
        var u = residuals[wi] / scale;
        newW.push((dof + 1) / (dof + u * u));
      }

      // Check convergence
      var maxChange = 0;
      for (var ci = 0; ci < n; ci++) {
        maxChange = Math.max(maxChange, Math.abs(newW[ci] - w[ci]));
      }
      w = newW;

      // Weighted least squares
      var sw = 0, wmx = 0, wmy = 0;
      for (var k = 0; k < n; k++) {
        sw += w[k];
        wmx += px[k] * w[k];
        wmy += py[k] * w[k];
      }
      wmx /= sw; wmy /= sw;

      var wsxy = 0, wsxx = 0;
      for (var m = 0; m < n; m++) {
        wsxy += w[m] * (px[m] - wmx) * (py[m] - wmy);
        wsxx += w[m] * (px[m] - wmx) * (px[m] - wmx);
      }
      var newSlope = wsxy / wsxx;
      result = { slope: newSlope, intercept: wmy - newSlope * wmx };

      if (maxChange < 1e-6) break;
    }

    result.weights = w;
    return result;
  }

  // SVG helper
  function el(tag, attrs) {
    var e = document.createElementNS(SVG_NS, tag);
    for (var key in attrs) {
      if (attrs.hasOwnProperty(key)) e.setAttribute(key, attrs[key]);
    }
    return e;
  }

  // --- Build static elements once ---
  function buildStatic() {
    // Background
    svg.appendChild(el('rect', {
      x: M.left, y: M.top, width: PW, height: PH,
      fill: '#fcfcfc', stroke: '#e8e8e8', 'stroke-width': 1
    }));

    // Grid lines
    for (var x = 0; x <= 10; x += 2) {
      svg.appendChild(el('line', {
        x1: sx(x), y1: M.top, x2: sx(x), y2: M.top + PH,
        stroke: '#f0f0f0', 'stroke-width': 1
      }));
    }
    for (var y = 0; y <= 100; y += 20) {
      svg.appendChild(el('line', {
        x1: M.left, y1: sy(y), x2: M.left + PW, y2: sy(y),
        stroke: '#f0f0f0', 'stroke-width': 1
      }));
    }

    // Axis labels
    for (var xa = 0; xa <= 10; xa += 2) {
      var xt = el('text', {
        x: sx(xa), y: M.top + PH + 16,
        'text-anchor': 'middle', 'font-size': 10, fill: '#aaa'
      });
      xt.textContent = xa;
      svg.appendChild(xt);
    }
    for (var ya = 0; ya <= 100; ya += 20) {
      var yt = el('text', {
        x: M.left - 8, y: sy(ya) + 3,
        'text-anchor': 'end', 'font-size': 10, fill: '#aaa'
      });
      yt.textContent = ya;
      svg.appendChild(yt);
    }

    // Axis titles
    var xLabel = el('text', {
      x: M.left + PW / 2, y: H - 5,
      'text-anchor': 'middle', 'font-size': 11, fill: '#999'
    });
    xLabel.textContent = 'Concentration';
    svg.appendChild(xLabel);

    var yLabel = el('text', {
      x: 14, y: M.top + PH / 2,
      'text-anchor': 'middle', 'font-size': 11, fill: '#999',
      transform: 'rotate(-90, 14, ' + (M.top + PH / 2) + ')'
    });
    yLabel.textContent = 'Response';
    svg.appendChild(yLabel);
  }

  // --- Create dynamic elements (persist across updates) ---
  var normalLine, robustLine;
  var dataCircles = [];
  var outlierCircle, outlierRing;

  function buildDynamic() {
    // Normal line (blue solid)
    normalLine = el('line', {
      x1: 0, y1: 0, x2: 0, y2: 0,
      stroke: '#2196F3', 'stroke-width': 2.5
    });
    svg.appendChild(normalLine);

    // Robust line (orange dashed)
    robustLine = el('line', {
      x1: 0, y1: 0, x2: 0, y2: 0,
      stroke: '#e85d3a', 'stroke-width': 2.5, 'stroke-dasharray': '8,4'
    });
    svg.appendChild(robustLine);

    // Data points (blue)
    for (var i = 0; i < nData; i++) {
      var c = el('circle', {
        cx: sx(xs[i]), cy: sy(ys[i]), r: 5,
        fill: '#2196F3', stroke: '#fff', 'stroke-width': 2
      });
      dataCircles.push(c);
      svg.appendChild(c);
    }

    // Outlier pulsing ring
    outlierRing = el('circle', {
      cx: sx(outlier.x), cy: sy(outlier.y), r: 12,
      fill: 'none', stroke: '#e85d3a', 'stroke-width': 1.5, opacity: 0.3
    });
    svg.appendChild(outlierRing);

    // Outlier point (red, draggable)
    outlierCircle = el('circle', {
      cx: sx(outlier.x), cy: sy(outlier.y), r: 8,
      fill: '#e85d3a', stroke: '#fff', 'stroke-width': 2,
      class: 'outlier-point'
    });
    svg.appendChild(outlierCircle);
  }

  // --- Update function (moves elements, no DOM destruction) ---
  function update() {
    var allX = xs.concat([outlier.x]);
    var allY = ys.concat([outlier.y]);

    // OLS (Normal likelihood)
    var olsResult = ols(allX, allY);

    // IRLS Student-t
    var robustResult = irlsStudentT(allX, allY, nu);
    var outlierWeight = robustResult.weights[nData]; // last point is the outlier

    // Update Normal line
    var ny1 = olsResult.slope * xMin + olsResult.intercept;
    var ny2 = olsResult.slope * xMax + olsResult.intercept;
    normalLine.setAttribute('x1', sx(xMin));
    normalLine.setAttribute('y1', sy(Math.max(yMin, Math.min(yMax, ny1))));
    normalLine.setAttribute('x2', sx(xMax));
    normalLine.setAttribute('y2', sy(Math.max(yMin, Math.min(yMax, ny2))));

    // Update Robust line
    var ry1 = robustResult.slope * xMin + robustResult.intercept;
    var ry2 = robustResult.slope * xMax + robustResult.intercept;
    robustLine.setAttribute('x1', sx(xMin));
    robustLine.setAttribute('y1', sy(Math.max(yMin, Math.min(yMax, ry1))));
    robustLine.setAttribute('x2', sx(xMax));
    robustLine.setAttribute('y2', sy(Math.max(yMin, Math.min(yMax, ry2))));

    // Update outlier position
    outlierCircle.setAttribute('cx', sx(outlier.x));
    outlierCircle.setAttribute('cy', sy(outlier.y));
    outlierRing.setAttribute('cx', sx(outlier.x));
    outlierRing.setAttribute('cy', sy(outlier.y));

    // Update weight display
    document.getElementById('weight-text').textContent = outlierWeight.toFixed(2);
    document.getElementById('weight-bar').style.width = (outlierWeight * 100) + '%';
  }

  // --- Initialize ---
  buildStatic();
  buildDynamic();
  update();

  // --- Drag handling on the outlier point ---
  var dragging = false;

  function getSVGPoint(clientX, clientY) {
    var pt = svg.createSVGPoint();
    pt.x = clientX;
    pt.y = clientY;
    var ctm = svg.getScreenCTM();
    if (!ctm) return null;
    return pt.matrixTransform(ctm.inverse());
  }

  outlierCircle.addEventListener('pointerdown', function(e) {
    dragging = true;
    try { outlierCircle.setPointerCapture(e.pointerId); } catch(err) {}
    e.preventDefault();
  });

  outlierCircle.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    var p = getSVGPoint(e.clientX, e.clientY);
    if (!p) return;
    outlier.x = Math.max(xMin + 0.5, Math.min(xMax - 0.5, unsx(p.x)));
    outlier.y = Math.max(yMin + 2, Math.min(yMax - 2, unsy(p.y)));
    update();
    e.preventDefault();
  });

  outlierCircle.addEventListener('pointerup', function(e) {
    dragging = false;
    try { outlierCircle.releasePointerCapture(e.pointerId); } catch(err) {}
  });

  outlierCircle.addEventListener('pointercancel', function() {
    dragging = false;
  });

  // --- Nu slider ---
  var nuSlider = document.getElementById('nu-slider');
  var nuDisplay = document.getElementById('nu-display');
  nuSlider.addEventListener('input', function(e) {
    nu = parseFloat(e.target.value);
    nuDisplay.textContent = nu;
    update();
  });
})();
</script>
</body>
</html>
